---
name: ci

# yamllint disable-line rule:truthy
on:
  push:
  pull_request:
    types:
      - opened
      - synchronize

concurrency:
  group: ci-${{github.workflow}}-${{github.ref}}-${{github.event.pull_request.number || github.run_number}}
  cancel-in-progress: true

permissions: {}

jobs:
  prechecks:
    uses: ./.github/workflows/pre-commit.yml
    permissions:
      issues: write # for label manipulation
      pull-requests: write # for label manipulation
  all-prechecks:
    needs: [prechecks]
    runs-on: ubuntu-24.04
    steps:
      - name: Success
        run: "true"
  tests:
    needs: [all-prechecks]
    uses: ./.github/workflows/build_and_test.yml
    permissions:
      actions: write # needed by skip-duplicate-actions
  # at2-tests:
  #   needs: [all-prechecks]
  #   uses: ./.github/workflows/build_and_test_at2.yml
  #   permissions:
  #     actions: write
  #   # runs-on: ubuntu-24.04
  #   # steps:
  #   #   - name: Success
  #   #     run: "true"
  all-tests:
    # needs: [tests, at2-tests]
    needs: [tests]
    runs-on: ubuntu-24.04
    steps:
      - name: Success
        run: "true"
