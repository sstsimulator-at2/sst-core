---
name: ci

# yamllint disable-line rule:truthy
on:
  push:
  pull_request:
    types:
      - labeled
      - opened
      - synchronize

concurrency:
  group: ci-${{github.ref}}-${{github.event.pull_request.number || github.run_number}}
  cancel-in-progress: true

permissions: {}

jobs:
  prechecks:
    uses: ./.github/workflows/pre-commit.yml
    # for label manipulation
    permissions:
      issues: write
      pull-requests: write
  all-prechecks:
    needs: [prechecks]
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: "true"
  tests:
    needs: [all-prechecks]
    uses: ./.github/workflows/build_and_test.yml
    permissions:
      actions: write
  at2-tests:
    needs: [all-prechecks]
    uses: ./.github/workflows/build_and_test_at2.yml
    permissions:
      actions: write
  all-tests:
    needs: [tests, at2-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: "true"
