---
name: rocky9

on:
  workflow_call:

permissions: {}

jobs:
  build-and-test:
    runs-on: macos-14
    steps:

      - name: Clone core
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          persist-credentials: false

      - name: Clone elements
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          path: sst-elements
          persist-credentials: false
          ref: devel
          repository: sstsimulator-at2/sst-elements

      - name: ccache
        uses: hendrikmuhs/ccache-action@63069e3931dedbf3b63792097479563182fe70d1  # v1.2
        with:
          append-timestamp: false
          create-symlink: false
          key: >-
            ccache-${{ github.job }}
          max-size: "2GB"
          verbose: 2

      - name: Compile and test core
        run: |
          env | sort
          pwd
          cd "${GITHUB_WORKSPACE}"
          ls -l
          cd ..
          ls -l
          # TODO the argument does nothing as long as Spack is unavailable
          # sst-core/.github/scripts/core_autotools_noflags_nodeps.sh gcc
