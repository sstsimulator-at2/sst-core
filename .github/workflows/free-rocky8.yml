---
name: Build/test on Rocky Linux 8

on:
  workflow_call:

concurrency:
  group: free-rocky8-${{github.workflow}}-${{github.ref}}-${{github.event.pull_request.number || github.run_number}}
  cancel-in-progress: true

permissions: {}

jobs:
  rocky8:
    name: Build/test core ref and elements devel
    runs-on: ubuntu-24.04
    container:
      image: rockylinux/rockylinux:8.10@sha256:e8a49c5403b687db05d4d67333fa45808fbe74f36e683cec7abb1f7d0f2338c6
    steps:

      - name: Install git
        run: |
          dnf -y upgrade
          dnf -y install git

      - name: Clone core
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: sst-core
          persist-credentials: false

      - name: Clone elements
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: sst-elements
          persist-credentials: false
          ref: devel
          repository: sstsimulator-at2/sst-elements

      - name: Install system-level dependencies
        run: |
          sst-core/.github/scripts/install_os_level_dependencies.sh

      - name: Install ccache
        run: |
          dnf -y install 'dnf-command(config-manager)'
          dnf -y config-manager --set-enabled powertools
          dnf -y install epel-release
          dnf -y install ccache

      - name: Configure ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03  # v1.2.23
        with:
          append-timestamp: false
          create-symlink: true
          key: >-
            ccache-${{ github.job }}
          max-size: "2GB"
          verbose: 2

      - name: Set environment variables
        run: |
          MAKEFLAGS="-j$(nproc)"
          {
              echo "MAKEFLAGS=${MAKEFLAGS}"
              echo "TERM=dumb"
              # https://github.com/open-mpi/ompi/issues/11295
              echo "PSM3_DEVICES=self"
          } >> "${GITHUB_ENV}"

      - name: Compile core
        run: |
          # TODO the argument does nothing as long as Spack is unavailable
          sst-core/.github/scripts/core_autotools_noflags_nodeps.sh gcc

      - name: Test core
        run: |
          install_autotools_noflags_nodeps_gcc/bin/sst-test-core

      - name: Save sst_test_outputs after core tests
        uses: actions/upload-artifact@v4
        with:
          name: sst_test_outputs_core_free-rocky8
          path: sst_test_outputs
          compression-level: 9
          if-no-files-found: error
          retention-days: 5
        if: ${{ !cancelled() }}

      - name: Compile elements
        run: |
          # TODO the argument does nothing as long as Spack is unavailable
          sst-core/.github/scripts/elements_autotools_noflags_nodeps.sh gcc

      - name: Test elements
        run: |
          install_autotools_noflags_nodeps_gcc/bin/sst-test-elements

      - name: Save sst_test_outputs after elements tests
        uses: actions/upload-artifact@v4
        with:
          name: sst_test_outputs_elements_free-rocky8
          path: sst_test_outputs
          compression-level: 9
          if-no-files-found: error
          retention-days: 5
        if: ${{ !cancelled() }}
