---
name: rocky9-nompi

on:
  workflow_call:

permissions: {}

jobs:
  rocky9-nompi:
    runs-on:
      - self-hosted
      - sst-rocky9
    steps:
      - name: ccache
        uses: hendrikmuhs/ccache-action@63069e3931dedbf3b63792097479563182fe70d1  # v1.2
        with:
          append-timestamp: false
          create-symlink: false
          key: >-
            ccache-${{ github.job }}
          max-size: "2GB"
          verbose: 2
      - name: Compile and test SST core and elements
        run: |
          pwd
          ls -al
          # TODO the argument does nothing as long as Spack is unavailable
          .github/scripts/core_autotools_noflags_nodeps_nompi.sh gcc
