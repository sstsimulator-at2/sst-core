---
name: rocky9-nompi

on:
  workflow_call:

permissions: {}

jobs:
  rocky9-nompi:
    runs-on:
      - self-hosted
      - sst-rocky9
    steps:

      - name: Clone core
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          persist-credentials: false

      - name: ccache
        uses: hendrikmuhs/ccache-action@63069e3931dedbf3b63792097479563182fe70d1  # v1.2
        with:
          append-timestamp: false
          create-symlink: false
          key: >-
            ccache-${{ github.job }}
          max-size: "2GB"
          verbose: 2

      - name: Compile and test core
        run: |
          cd "${GITHUB_WORKSPACE}"
          # TODO the argument does nothing as long as Spack is unavailable
          sst-core/.github/scripts/core_autotools_noflags_nodeps_nompi.sh gcc
