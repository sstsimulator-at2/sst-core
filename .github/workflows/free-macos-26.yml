---
name: Build/test on macOS 26

on:
  workflow_call:

concurrency:
  group: free-macos-26-${{github.workflow}}-${{github.ref}}-${{github.event.pull_request.number || github.run_number}}
  cancel-in-progress: true

permissions: {}

jobs:
  macos-26:
    name: Build/test core ref and elements devel
    runs-on: macos-26
    steps:

      - name: Clone core
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          path: sst-core
          persist-credentials: false

      - name: Clone elements
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          path: sst-elements
          persist-credentials: false
          ref: devel
          repository: sstsimulator/sst-elements

      - name: Install system-level dependencies
        run: |
          sst-core/.github/scripts/install_os_level_dependencies.sh

      - name: Install and configure ccache
        uses: hendrikmuhs/ccache-action@63069e3931dedbf3b63792097479563182fe70d1  # v1.2.18
        with:
          append-timestamp: false
          create-symlink: true
          key: >-
            ccache-${{ github.job }}
          max-size: "2GB"
          verbose: 2

      - name: Set environment variables
        run: |
          MAKEFLAGS="-j$(nproc)"
          echo "MAKEFLAGS=${MAKEFLAGS}" >> "${GITHUB_ENV}"
          echo "TERM=dumb" >> "${GITHUB_ENV}"

      - name: Pin Python version
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.13'

      - name: Compile core
        run: |
          # TODO the argument does nothing as long as Spack is unavailable
          sst-core/.github/scripts/core_autotools_noflags_nodeps.sh gcc

      - name: Test core
        run: |
          install_autotools_noflags_nodeps_gcc/bin/sst-test-core

      - name: Save sst_test_outputs after core tests
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sst_test_outputs_core_free-macos-26
          path: sst_test_outputs
          compression-level: 9
          if-no-files-found: error
          retention-days: 5
        if: ${{ !cancelled() }}

      - name: Compile elements
        run: |
          # TODO the argument does nothing as long as Spack is unavailable
          sst-core/.github/scripts/elements_autotools_noflags_nodeps.sh gcc

      - name: Test elements
        run: |
          install_autotools_noflags_nodeps_gcc/bin/sst-test-elements

      - name: Save sst_test_outputs after elements tests
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sst_test_outputs_elements_free-macos-26
          path: sst_test_outputs
          compression-level: 9
          if-no-files-found: error
          retention-days: 5
        if: ${{ !cancelled() }}
